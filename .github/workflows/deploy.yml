name: Deploy to Hetzner

# Bu iş ne zaman başlasın?
on:
  push:
    branches: [ main ] # Sen 'main' dalına kod gönderdiğinde (push) çalışır.

jobs:
  deploy:
    runs-on: ubuntu-latest # GitHub bu işi kendi geçici sunucularında başlatır.
    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # GitHub'daki kodlarını kopyalar.

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master # Sunucuna bağlanmak için bir araç kullanır.
        with:
          host: ${{ secrets.SERVER_IP }} # Kaydettiğimiz IP'yi kullanır.
          username: ${{ secrets.SERVER_USER }} # Kaydettiğimiz kullanıcıyı (cnn) kullanır.
          key: ${{ secrets.SSH_PRIVATE_KEY }} # O uzun SSH anahtarını kullanır.
          script: |
            cd ~/bitirme_devops
            git pull origin main
            sudo docker compose up -d --build